<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Contact</title>
    <style>
      body {
        font-family: "Noto Sans Thai", sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f5f5f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        box-sizing: border-box;
      }

      h1 {
        color: #333;
        margin-bottom: 20px;
      }

      .contact-container {
        background-color: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
        width: 80%;
        max-width: 600px;
        text-align: center;
      }

      .contact-container h1 {
        font-size: 2em;
        color: #4a4a4a;
        margin-bottom: 20px;
      }

      .contact-container p {
        font-size: 1em;
        color: #555;
        margin-bottom: 40px;
        line-height: 1.6;
      }

      .contact-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      input,
      textarea {
        width: 100%;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 1em;
        color: #000000;
        background-color: #fafafa;
        outline: none;
        transition: border-color 0.3s ease;
      }

      input:focus,
      textarea:focus {
        border-color: #000000;
      }

      textarea {
        resize: none;
        height: 150px;
      }

      button {
        padding: 15px;
        border: none;
        border-radius: 4px;
        background-color: #0b0b0c;
        color: white;
        font-size: 1.1em;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      button:hover {
        background-color: #000000;
      }

      .social-icons {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 15px;
      }

      .social-icons a {
        display: inline-block;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        overflow: hidden;
        margin: 0 10px;
        transition: transform 0.3s ease;
      }

      .social-icons a img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .social-icons a:hover {
        transform: scale(1.1);
      }

      @media (max-width: 768px) {
        .contact-container {
          padding: 20px;
          width: 90%;
        }

        button {
          font-size: 1em;
        }
      }
    </style>
  </head>
  <body>
    <div class="contact-container">
      <h1>Contact</h1>
      <p>
        หากคุณมีคำถาม ข้อเสนอแนะ หรือขอข้อมูลเพิ่มเติม
        กรุณาติดต่อเราผ่านฟอร์มด้านล่าง หรือโทรศัพท์เราได้ที่เบอร์
      </p>
      <div class="contact-form">
        <input
          type="text"
          name="name"
          placeholder="นางสาวชุติมน นันทะเสนา"
          required
        />
        <input
          type="email"
          name="email"
          placeholder="Chutimon.nun@ku.th"
          required
        />
        <textarea name="message" placeholder="ข้อความ" required></textarea>
        <button type="submit">ส่งข้อความ</button>
      </div>

      <div class="social-icons">
        <a href="https://www.facebook.com/chutimol.nunthasena/" target="_blank">
          <img src="images/F1.jpg" alt="Facebook" />
        </a>
        <a href="https://www.instagram.com/x_ing.ig/?hl=th" target="_blank">
          <img src="images/I.jpg" alt="Instagram" />
        </a>
        <a href="https://line.me/ti/p/lBLTtLVsla" target="_blank">
          <img src="images/L.jpg" alt="Line" />
        </a>
      </div>
      
    </div>
  </body>
</html>
